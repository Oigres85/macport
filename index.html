<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catena Macro → Portafoglio</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap');
  :root{--bg:#000;--card:#0c0c0e;--bd:#1c1c1f;--txt:#ececec;--mut:#8a8a90;--dim:#56565c;
    --grn:#26d07c;--red:#ff5470;--amb:#ffb02e;--mono:'JetBrains Mono',ui-monospace,Menlo,monospace}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--txt);font-family:var(--mono);line-height:1.5;-webkit-font-smoothing:antialiased}
  .wrap{max-width:760px;margin:0 auto;padding:14px}
  .card{background:var(--card);border:1px solid var(--bd);border-radius:14px;padding:16px;margin-bottom:14px}
  h1{font-size:16px;font-weight:700;letter-spacing:.3px}
  h2{font-size:10px;font-weight:700;letter-spacing:1.5px;color:var(--mut);text-transform:uppercase;margin-bottom:12px}
  .sub{font-size:10px;color:var(--dim)}
  .drv{padding:11px 0;border-bottom:1px solid var(--bd)}
  .drv:last-child{border-bottom:none}
  .scale{position:relative;height:7px;background:linear-gradient(90deg,var(--grn),var(--amb),var(--red));border-radius:4px;margin:7px 0 6px}
  .mark{position:absolute;top:-3px;width:4px;height:13px;background:#fff;border-radius:2px;box-shadow:0 0 6px #fff8}
  .tag{font-family:var(--mono);font-size:8px;border-radius:4px;padding:1px 6px;border:1px solid}
  .chip{display:inline-block;font-family:var(--mono);font-size:10px;border-radius:5px;padding:2px 7px;margin:0 4px 4px 0}
  table{width:100%;border-collapse:collapse}
  th,td{padding:7px 3px;text-align:center}
  .note{font-size:10.5px;color:var(--mut);line-height:1.55;margin-top:8px}
  .foot{font-size:9px;color:var(--dim);text-align:center;padding:14px 0;line-height:1.5}
</style>
</head>
<body>
<div class="wrap" id="app"><div style="color:#8a8a90;padding:24px;font-size:13px">Carico i dati…</div></div>
<script>
window.onerror=function(m,s,l){var a=document.getElementById("app");if(a)a.innerHTML='<div style="color:#ff5470;padding:24px;font-size:13px">Errore: '+m+' (riga '+l+')</div>';return false;};

var C={grn:"#26d07c",red:"#ff5470",amb:"#ffb02e",mut:"#8a8a90",dim:"#56565c",bd:"#1c1c1f"};
function esc(s){return String(s==null?"":s).replace(/[&<>"]/g,function(m){return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[m];});}
function expColor(v){return v>=2?C.grn:v===1?"#1c7a4d":v===0?"#2a2a2e":v===-1?"#9a3550":C.red;}
function expGlyph(v){return v>0?"\u25B2":v<0?"\u25BC":"\u00B7";}

// letture di trasmissione per driver (testo fisso che spiega il meccanismo)
var READ={
 "US10Y":"Rendimenti bassi/in calo: i growth ad alto multiplo respirano. In rialzo: comprimono le valutazioni.",
 "PETROLIO":"Oil alto alimenta inflazione, rischio rialzo rendimenti, vento contrario sui growth e su Tesla.",
 "BITCOIN":"Proxy del rischio crypto: pressione diretta su MSTR (bitcoin a leva).",
 "EUR/USD":"Euro forte erode i guadagni in dollari quando li riporti in euro. Pesa uniforme sul book USD.",
 "VIX":"Volatilita bassa = regime calmo ma poca protezione; in salita colpisce prima i beta alti.",
 "TAIWAN / SEMI":"Salute della catena TSMC/AI: vento strutturale per i semiconduttori del tuo book."
};
var ABBR={"US10Y":"10Y","PETROLIO":"OIL","BITCOIN":"BTC","EUR/USD":"\u20ac/$","VIX":"VIX","TAIWAN / SEMI":"TW"};

function render(D){
  var h="";
  // header
  h+='<div class="card" style="background:#000;border-color:#333">'
   +'<div style="display:flex;align-items:center;gap:9px"><span style="width:9px;height:9px;border-radius:50%;background:'+C.amb+';box-shadow:0 0 8px '+C.amb+'"></span>'
   +'<h1>CATENA MACRO \u2192 PORTAFOGLIO</h1></div>'
   +'<div class="sub" style="margin-top:5px">agg. '+esc(D.updated)+' \u00b7 8 titoli \u00b7 ~80% semi \u00b7 dati Stooq</div></div>';

  // 1) driver -> trasmissione
  h+='<div class="card"><h2>\u2460 I driver macro \u2192 dove si trasmettono</h2>';
  D.drivers.forEach(function(d){
    var col=d.pos>=60?C.red:d.pos>=45?C.amb:C.grn;
    var hit=D.titoli.filter(function(t){return Math.abs(t.exp[d.k])>=2;})
      .map(function(t){var v=t.exp[d.k];var cc=v>0?C.grn:C.red;
        return '<span class="chip" style="border:1px solid '+cc+'55;color:'+cc+'">'+expGlyph(v)+' '+t.t+'</span>';}).join("");
    if(!hit)hit='<span class="chip" style="border:1px solid '+C.dim+'55;color:'+C.dim+'">impatto diffuso</span>';
    h+='<div class="drv"><div style="display:flex;justify-content:space-between;align-items:baseline">'
     +'<b style="font-size:12px;color:#e8e8e8">'+esc(d.k)+' <span style="color:'+C.dim+';font-weight:400">'+esc(d.val)+'</span>'
     +(d.fresh?'':' <span style="color:'+C.red+';font-size:8px">n.d.</span>')+'</b>'
     +'<span class="tag" style="color:'+col+';border-color:'+col+'55">'+esc(d.stato)+'</span></div>'
     +'<div class="scale"><div class="mark" style="left:calc('+d.pos+'% - 2px)"></div></div>'
     +'<div style="font-size:10.5px;color:#c8c8cc;line-height:1.5">'+esc(READ[d.k]||"")+'</div>'
     +'<div style="margin-top:6px">'+hit+'</div></div>';
  });
  h+='<div class="note">Barra a sinistra = oggi <b style="color:'+C.grn+'">aiuta</b>, a destra = <b style="color:'+C.red+'">penalizza</b>. I chip = titoli su cui pesa di piu (\u25B2 a favore / \u25BC contro).</div></div>';

  // 2) matrice
  h+='<div class="card"><h2>\u2461 Matrice \u2014 ogni vento su ogni titolo</h2><div style="overflow-x:auto"><table>';
  h+='<thead><tr><th style="text-align:left;font-size:8px;color:'+C.dim+'">TITOLO</th>';
  D.drivers.forEach(function(d){h+='<th style="font-size:8px;color:'+C.dim+'">'+(ABBR[d.k]||d.k)+'</th>';});
  h+='<th style="font-size:8px;color:'+C.dim+'">NET</th></tr></thead><tbody>';
  D.titoli.forEach(function(t){
    var net=0;D.drivers.forEach(function(d){net+=t.exp[d.k];});
    var ncol=net>0?C.grn:net<0?C.red:C.mut;
    h+='<tr style="border-top:1px solid '+C.bd+'"><td style="text-align:left"><b style="font-size:11px">'+t.t+'</b>'
     +'<div style="font-size:7.5px;color:'+C.dim+'">'+t.sec+' \u00b7 \u03b2'+t.beta+'</div></td>';
    D.drivers.forEach(function(d){var v=t.exp[d.k];
      h+='<td><div style="width:22px;height:22px;border-radius:5px;margin:0 auto;background:'+expColor(v)+';display:flex;align-items:center;justify-content:center;font-size:10px;color:#fff;opacity:'+(v===0?0.35:1)+'">'+expGlyph(v)+'</div></td>';});
    h+='<td><b style="font-size:12px;color:'+ncol+'">'+(net>0?"+":"")+net+'</b></td></tr>';
  });
  h+='</tbody></table></div><div class="note">Colonna <b>NET</b> = somma dei venti: piu e rosso, piu quel titolo ha il meteo contro adesso. E li che guardi per primo.</div></div>';

  // 3) bussola
  h+='<div class="card" style="border-color:#2a2a12"><h2 style="color:'+C.amb+'">\u2462 La bussola \u2014 regole fisse</h2>'
   +'<div style="font-size:11px;color:#d8d8dc;line-height:1.7">'
   +'\u2022 Cuscinetto 6 mesi separato prima di nuovi rischi.<br>'
   +'\u2022 Ridurre \u03b2 verso 1,3-1,5 coi nuovi flussi (auto = motore non-AI).<br>'
   +'\u2022 Stop larghi sul beta, ancorati sotto i supporti. Trailing: alza, mai abbassa.<br>'
   +'\u2022 Leva e pre-IPO congelate finche cuscinetto e diversificazione non completi.<br>'
   +'\u2022 L\'asticella e SMH, non lo zero.</div></div>';

  h+='<div class="foot">Catena Macro\u2192Portafoglio \u00b7 dati Stooq via GitHub Actions \u00b7 non e consulenza finanziaria.<br>Prezzi/P&L sul book Sella \u00b7 news su Investing.com.</div>';
  document.getElementById("app").innerHTML=h;
}

fetch("data.json?"+Date.now())
  .then(function(r){if(!r.ok)throw new Error("data.json non trovato (HTTP "+r.status+")");return r.json();})
  .then(render)
  .catch(function(e){document.getElementById("app").innerHTML='<div style="color:#ffb02e;padding:24px;font-size:13px;line-height:1.6"><b>Dati non ancora disponibili.</b><br><br>'+esc(e.message)+'<br><br>Se hai appena creato il repo: vai su Actions e lancia "Run workflow" una volta per generare il primo data.json.</div>';});
</script>
</body>
</html>
