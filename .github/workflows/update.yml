name: Aggiorna dati macro

on:
  schedule:
    # ogni ora dalle 13:00 alle 22:00 UTC, lun-ven (mercati USA + pre-market)
    - cron: '0 13-22 * * 1-5'
  workflow_dispatch: {}   # permette di lanciarlo a mano dal bottone "Run workflow"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Esegui il robot dati
        run: python fetch_data.py
      - name: Commit data.json
        run: |
          git config user.name "macro-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "dati aggiornati $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
